<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>excalidraw-tui</title>
    <!-- Excalidraw + React come from the CDN (esm.sh). ponytail: needs internet;
         offline would mean vendoring a bundled build. -->
    <link
      rel="stylesheet"
      href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css"
    />
    <style>
      html,
      body,
      #app {
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
      // Where Excalidraw loads its fonts/assets from.
      window.EXCALIDRAW_ASSET_PATH =
        "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/prod/";
    </script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "@excalidraw/excalidraw": "https://esm.sh/@excalidraw/excalidraw@0.18.0?external=react,react-dom"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";
      import {
        Excalidraw,
        MainMenu,
        serializeAsJSON,
      } from "@excalidraw/excalidraw";

      // Two things load: the drawing (per-file) and the global config (theme,
      // prefs, library — shared across every drawing).
      const [scene, config] = await Promise.all([
        fetch("/scene").then((r) => r.json()), // null = new/empty file
        fetch("/config").then((r) => r.json()), // {} if never saved
      ]);

      // UI preferences we persist globally. These are appState fields; anything
      // not here (scroll, zoom, selection) stays per-drawing. Add a key to keep
      // another setting across reloads.
      const PREF_KEYS = [
        "theme",
        "viewBackgroundColor",
        "zenModeEnabled",
        "viewModeEnabled",
        "gridModeEnabled",
        "gridSize",
        "objectsSnapModeEnabled",
      ];
      const pickPrefs = (appState) => {
        const p = {};
        for (const k of PREF_KEYS) if (k in appState) p[k] = appState[k];
        return p;
      };

      const prefs = config.prefs || {};
      let library = config.libraryItems || [];

      // Drawing autosave (per-file). ponytail: debounced — a hard kill can drop
      // the last <500ms of edits; flush-on-exit is the upgrade path.
      let sceneTimer = null;
      function saveScene(elements, appState, files) {
        clearTimeout(sceneTimer);
        sceneTimer = setTimeout(() => {
          fetch("/scene", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: serializeAsJSON(elements, appState, files, "local"),
          });
        }, 500);
      }

      // Config autosave (global): prefs + library.
      let configTimer = null;
      function saveConfig(appState) {
        clearTimeout(configTimer);
        configTimer = setTimeout(() => {
          fetch("/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prefs: pickPrefs(appState), libraryItems: library }),
          });
        }, 500);
      }

      let lastAppState = null;
      function onChange(elements, appState, files) {
        lastAppState = appState;
        saveScene(elements, appState, files);
        saveConfig(appState);
      }
      function onLibraryChange(items) {
        library = items;
        if (lastAppState) saveConfig(lastAppState);
      }

      const initialData = {
        ...(scene || {}),
        // Global prefs win over whatever appState the drawing was saved with.
        appState: { ...((scene && scene.appState) || {}), ...prefs },
        libraryItems: library,
        scrollToContent: !!(scene && scene.elements && scene.elements.length),
      };

      // The embedded component ships a minimal menu; the excalidraw.com webapp
      // adds its own chrome. Rebuild a fuller menu from the component's own
      // default items. CommandPalette + SearchMenu expose every command (zen,
      // grid, view mode, snap, tool lock, ...) that the webapp's menu shows.
      // Filter by what exists in this version so a renamed item can't crash.
      const DI = MainMenu.DefaultItems;
      const order = [
        "SearchMenu",
        "CommandPalette",
        "Export",
        "SaveAsImage",
        "ChangeCanvasBackgroundColor",
        "ToggleTheme",
        "Help",
        "Socials",
      ];
      const menuItems = order
        .filter((name) => DI[name])
        .map((name) => React.createElement(DI[name], { key: name }));

      const root = createRoot(document.getElementById("app"));
      root.render(
        React.createElement(
          Excalidraw,
          { initialData, onChange, onLibraryChange },
          React.createElement(MainMenu, null, ...menuItems)
        )
      );
    </script>
  </body>
</html>
